<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Trabajador</title>
    <link rel="stylesheet" href="stilos/registroStyle.css">
    <link rel="shortcut icon" href="stilos/img/iconoEditar.png" type="image/x-icon">
</head>
<body>

<div class="form-container">
    <h2>Editar Trabajador</h2>

    <form id="formEditar">
        <label>Nombre:</label>
        <input type="text" id="nombre">

        <label>Edad:</label>
        <input type="number" id="edad">

        <label>Puesto:</label>
        <input type="text" id="puesto">

        <label>Departamento:</label>
        <input type="text" id="departamento">

        <label>Fecha de contratación:</label>
        <input type="date" id="fecha_contratacion">

        <br>
        <button type="submit" class="btn">GUARDAR CAMBIOS</button>
        <br><br>
        <a class="btn" href="consulta.html">CANCELAR</a>
    </form>
</div>

<script src="script/editar.js"></script>
</body>
</html>
