<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stilos/registroStyle.css">
    <link rel="icon" href="stilos/img/iconoRegistro.png" type="image/png">
    <title>REGISTRO</title>
</head>
<body>

         <div class="form-container">
        <h2>Registrar Trabajador</h2>

        <form id="formTrabajador">
            
            <label>Nombre:</label>
            <input type="text" id="nombre" required>

            <label>Edad:</label>
            <input type="number" id="edad" min="18" required>

            <label>Puesto:</label>
            <input type="text" id="puesto" required>

            <label>Departamento:</label>
            <input type="text" id="departamento" required>

            <label>Fecha de contratación:</label>
            <input type="date" id="fecha_contratacion" required>
                <br>
            <div class="botones">
            
            <button type="submit" id="btnGuardar" class="btn">AGREGAR</button>
            <br><br>

            <button class="btn" onclick="window.history.go(-1)">REGRESAR</button>

            
        </div>
        </form>

        
    </div>


    <script src="script/registro1.js"></script>
</body>
</html>
